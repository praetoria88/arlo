name: deploy-hello-world-api

on:
  push:
    branches: [ main ]

jobs:
  call-template:
    uses: ./.github/workflows/api-deploy-template.yml
    with:
      app-name: "hello-world-api"
      ec2-instance-id: "i-06bc40fd5cfe04c57"
      aws-region: "ap-southeast-2"
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}